plugins {
id 'com.android.application'

}

android {
namespace "com.plain.keyboard.soft"
compileSdk 29

lint {
        checkReleaseBuilds false
    }

defaultConfig {  
    applicationId "com.plain.keyboard.soft"  
    minSdk 29
    targetSdk 33
    versionCode 47
    versionName "4.7"  
}  

buildTypes {  
    release {  
        minifyEnabled false  
        shrinkResources false  
         }  
}

}

dependencies {
implementation fileTree(dir: 'libs', include: ['*.jar'])
implementation 'com.google.android.material:material:1.11.0'
}

